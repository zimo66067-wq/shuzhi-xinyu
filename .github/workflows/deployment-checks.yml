name: Deployment Checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

  backend-smoke:
    name: Backend smoke test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DEEPSEEK_API_KEY: ci-placeholder
      TENCENT_SECRET_ID: ci-placeholder
      TENCENT_SECRET_KEY: ci-placeholder
      PARENT_PASSWORD: ci-only-password
      PARENT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Import app and check health endpoint
        run: >-
          python -c "from app import app;
          client = app.test_client();
          response = client.get('/api/health');
          assert response.status_code == 200, response.status_code;
          assert response.get_json() == {'status': 'ok'}, response.get_data(as_text=True)"
