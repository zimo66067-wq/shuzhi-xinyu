# ============================================================
# 数智心屿 · Nginx 站点配置
# 路径：/etc/nginx/sites-available/xinyu
# 启用：ln -sf /etc/nginx/sites-available/xinyu /etc/nginx/sites-enabled/xinyu
#       rm -f /etc/nginx/sites-enabled/default
#       nginx -t && systemctl reload nginx
#
# 包含两个 server 块：
#   1) HTTP (80)  → 强制跳 HTTPS（如果你有 SSL；否则把 SSL 块注释掉）
#   2) HTTPS (443) → 真正的服务入口
# ============================================================

# ── HTTP 80：跳 HTTPS（有域名 + SSL 时启用） ─────────────────
# 没有域名 / 暂不上 SSL 时，把这个 server 块和下面的 443 server 块
# 都注释掉，只保留最底下那个「纯 HTTP 80 部署」段。
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;  # ← 改成你的域名

    # 强制 HTTPS
    return 301 https://$host$request_uri;
}

# ── HTTPS 443：主服务 ─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.domain.com;  # ← 改成你的域名

    # SSL 证书（Let's Encrypt 通过 certbot 自动签发后路径会是这两个）
    ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;

    # 现代 SSL 参数（Mozilla intermediate 推荐）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全 HTTP 头（与后端 Flask 加的头互补 / 加固）
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), payment=(), usb=(), microphone=(self)" always;

    # 上传 / 请求体上限（与后端 MAX_CONTENT_LENGTH=1MB 对齐，STT 上传放宽到 10MB）
    client_max_body_size 10m;

    # 日志
    access_log /var/log/nginx/xinyu.access.log;
    error_log  /var/log/nginx/xinyu.error.log warn;

    # gzip 压缩（前端 JS bundle 1.5MB → 425KB）
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ── 前端静态文件 ─────────────────────────────────
    root /opt/shuzhi-xinyu/frontend/dist;
    index index.html;

    # 静态资源带 hash，永久缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 3D 模型（.vrm / .glb）单独配置 — 大文件但不变
    location ~* \.(vrm|glb|gltf)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── API 反代到后端 Gunicorn ──────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 给 LLM 留足时间（DeepSeek 偶尔 20+ 秒）
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 流式响应（如果后续要做 SSE 流式 TTS）
        proxy_buffering off;
    }

    # ── SPA 路由兜底 ─────────────────────────────────
    # 任何不存在的路径都返回 index.html，由前端 React Router 处理
    location / {
        try_files $uri $uri/ /index.html;
    }
}


